<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #fff;
}

header {
  padding: 20px;
  font-size: 22px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.level {
  font-size: 14px;
  color: #94a3b8;
}

.count {
  font-size: 20px;
  font-weight: bold;
}

.total-box {
  margin-top: 20px;
  background: #16a34a;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.system-box {
  margin-top: 20px;
  background: #2563eb;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
}

.chart-container {
  margin-top: 30px;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🚀 Game Analytics Dashboard</header>

<div class="container">

  <!-- LEVEL CARDS -->
  <div class="grid">
    <div class="card"><div class="level">Level 1</div><div class="count">170 users</div></div>
    <div class="card"><div class="level">Level 2</div><div class="count">80 users</div></div>
    <div class="card"><div class="level">Level 3</div><div class="count">65 users</div></div>
    <div class="card"><div class="level">Level 4</div><div class="count">72 users</div></div>
    <div class="card"><div class="card"><div class="level">Level 5</div><div class="count">90 users</div></div></div>

    <div class="card"><div class="level">Level 6</div><div class="count">55 users</div></div>
    <div class="card"><div class="level">Level 7</div><div class="count">60 users</div></div>
    <div class="card"><div class="level">Level 8</div><div class="count">70 users</div></div>
    <div class="card"><div class="level">Level 9</div><div class="count">56 users</div></div>
    <div class="card"><div class="level">Level 10</div><div class="count">60 users</div></div>
  </div>

  <!-- TOTAL -->
  <div class="total-box">
    Total Users: 778
  </div>

  <!-- SYSTEM INFO -->
  <div class="system-box">
    💾 Storage & RAM Usage: <b>1.9 GB</b>
  </div>

  <!-- CHART -->
  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['L1','L2','L3','L4','L5','L6','L7','L8','L9','L10'],
    datasets: [{
      label: 'Users Played',
      data: [170,80,65,72,90,55,60,70,56,60],
      borderWidth: 1
    }]
  },
  options: {
    animation: {
      duration: 2000
    },
    plugins: {
      legend: {
        labels: {
          color: "white"
        }
      }
    },
    scales: {
      x: {
        ticks: { color: "white" }
      },
      y: {
        ticks: { color: "white" }
      }
    }
  }
});
</script>

</body>
</html>
